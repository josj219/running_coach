services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coach
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: ${DB_PASSWORD:-coach}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d coach"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build: ./api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://coach:${DB_PASSWORD:-coach}@db:5432/coach
      TZ: ${TZ:-Asia/Seoul}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    ports:
      - "8000:8000"

  web:
    build: ./web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  pgdata:
