# 일회성 관리 작업 — DB 초기화 + 첫 계정 생성. 수동 실행 전용(workflow_dispatch).
# 셀프 회원가입이 없으므로 계정은 여기(서버 위 self-hosted runner)에서 만든다.
# ⚠️ reset=true 면 pgdata 볼륨을 삭제한다(데이터 영구 삭제). 백업을 먼저 뜬다.
name: admin-reset

on:
  workflow_dispatch:
    inputs:
      email:
        description: "생성할 계정 이메일"
        required: true
      nickname:
        description: "닉네임"
        required: true
        default: "러너"
      reset:
        description: "DB 초기화 여부(pgdata 볼륨 삭제)"
        type: boolean
        default: true

concurrency:
  group: deploy-prod          # 배포와 같은 그룹 — 동시 실행 방지
  cancel-in-progress: false

jobs:
  admin:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          umask 077
          cat > .env <<EOF
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CLAUDE_MODEL=claude-sonnet-4-6
          COACH_MOCK=
          TUNNEL_TOKEN=${{ secrets.TUNNEL_TOKEN }}
          STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }}
          WEB_BASE_URL=${{ secrets.WEB_BASE_URL }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          TZ=Asia/Seoul
          EOF

      - name: Backup before reset
        run: bash ops/backup.sh || echo "⚠️ 백업 스크립트 실패(계속 진행)"

      - name: Reset DB volume
        if: ${{ inputs.reset }}
        run: |
          docker compose -f docker-compose.prod.yml down
          vol=$(docker volume ls -q | grep pgdata | head -1)
          echo "removing volume: $vol"
          [ -n "$vol" ] && docker volume rm "$vol" || echo "no pgdata volume found"
          docker compose -f docker-compose.prod.yml up -d

      - name: Wait for api healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.prod.yml exec -T api \
                 curl -fsS http://localhost:8000/api/health >/dev/null; then
              echo "✅ api healthy"; exit 0
            fi
            echo "… waiting ($i/30)"; sleep 3
          done
          echo "❌ api 미기동"; exit 1

      - name: Create account
        env:
          INIT_PW: ${{ secrets.INIT_USER_PASSWORD }}
          EMAIL: ${{ inputs.email }}
          NICK: ${{ inputs.nickname }}
        run: |
          docker compose -f docker-compose.prod.yml exec -T \
            -e INIT_PW="$INIT_PW" api \
            sh -c 'python -m app.create_user "'"$EMAIL"'" "$INIT_PW" "'"$NICK"'"'
